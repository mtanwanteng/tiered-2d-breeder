<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Plain archival cream tile-face fill per curator-spec §2.3:
       no marbling, no veins. A flat #fafaf5 with very faint paper grain. -->
  <defs>
    <filter id="archival-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="3.5" numOctaves="2" seed="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.05
                                            0 0 0 0 0.05
                                            0 0 0 0 0.05
                                            0 0 0 0.025 0"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#fafaf5"/>
  <rect width="200" height="200" filter="url(#archival-grain)"/>
</svg>
