<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Linen wallpaper at ~2% opacity per curator-spec §2.3:
       almost invisible, readable as fabric only at close inspection.
       Tightly-woven horizontal + vertical thin sepia lines on the cream bg. -->
  <defs>
    <pattern id="linen-warp" width="3" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#1a1a1a" stroke-width="0.4" opacity="0.05"/>
      <line x1="0" y1="0" x2="3" y2="0" stroke="#1a1a1a" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <filter id="linen-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.0" numOctaves="2" seed="11"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.05
                                            0 0 0 0 0.05
                                            0 0 0 0 0.05
                                            0 0 0 0.04 0"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#fafaf5"/>
  <rect width="200" height="200" fill="url(#linen-warp)"/>
  <rect width="200" height="200" filter="url(#linen-grain)"/>
</svg>
