<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Sepia border treatment per cartographer-spec §2.3:
       very faint horizontal lines suggesting hand-ruled paper grain on the
       border of a journal leaf. Used as the parent decoration / border-
       treatment role for surface chrome that wraps tiles or modals. -->
  <defs>
    <filter id="sepia-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="3" seed="13"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.23
                                            0 0 0 0 0.16
                                            0 0 0 0 0.09
                                            0 0 0 0.08 0"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#e8dcc0"/>
  <rect width="200" height="200" filter="url(#sepia-grain)"/>
</svg>
