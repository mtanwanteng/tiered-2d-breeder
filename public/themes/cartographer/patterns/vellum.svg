<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Plain vellum tile-face fill per cartographer-spec §2.3:
       flat #f0e6cf with subtle paper grain and a single faint grid line
       down the right edge ("this is a journal tile"). -->
  <defs>
    <filter id="vellum-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.4" numOctaves="2" seed="5"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.23
                                            0 0 0 0 0.16
                                            0 0 0 0 0.09
                                            0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#f0e6cf"/>
  <rect width="200" height="200" filter="url(#vellum-grain)"/>
  <line x1="186" y1="0" x2="186" y2="200" stroke="#3a2818" stroke-width="0.4" opacity="0.3"/>
</svg>
