<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.4" numOctaves="2" seed="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.16
                                            0 0 0 0 0.12
                                            0 0 0 0 0.08
                                            0 0 0 0.45 0"/>
    </filter>
    <pattern id="leather" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#5a4528"/>
      <rect width="80" height="80" filter="url(#grain)"/>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#leather)"/>
</svg>
